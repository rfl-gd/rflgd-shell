name: Publish @rfl-gd/shell

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # Raw-source package — no build/bundle. Install deps for the typecheck gate.
      - run: pnpm install --no-frozen-lockfile

      # Only quality gate: the published source must typecheck.
      - run: pnpm typecheck

      # Guard: package.json version must match the pushed tag (vX.Y.Z).
      - name: Verify version matches tag
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "package.json version ($PKG) != tag ($TAG)" >&2
            exit 1
          fi

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
